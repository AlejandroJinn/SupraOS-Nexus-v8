<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KlawAqua — Video Call con KAIYA</title>
<style>
:root{--bg:#050a14;--card:#0a1628;--accent:#00d4ff;--green:#00e676;--text:#e0f7ff;--text2:#8aa8c8;--border:#112240;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{padding:16px 24px;background:var(--card);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:1.2rem;background:linear-gradient(90deg,var(--accent),#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header .status{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text2);}
.header .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.main{flex:1;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:1400px;margin:0 auto;width:100%;}
.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;height:calc(100vh - 220px);}
@media(max-width:768px){.video-grid{grid-template-columns:1fr;height:auto;}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.panel-label{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.6);padding:4px 12px;border-radius:6px;font-size:0.75rem;z-index:10;font-weight:600;}
.panel video{flex:1;width:100%;height:100%;object-fit:cover;background:#000;}
.controls{padding:12px 24px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
.btn{padding:12px 24px;border-radius:50px;border:none;font-weight:600;cursor:pointer;font-size:0.9rem;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#00f0ff;transform:scale(1.05);}
.btn-danger{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-danger:hover{border-color:var(--accent);}
.chat-area{padding:12px 24px;background:var(--card);border-top:1px solid var(--border);max-height:120px;overflow-y:auto;font-size:0.85rem;}
.chat-msg{margin-bottom:6px;}
.chat-msg .name{font-weight:600;color:var(--accent);}
.chat-msg.user .name{color:var(--green);}
.hidden{display:none;}
.recording-indicator{position:absolute;top:12px;right:12px;background:#ff1744;color:#fff;padding:4px 10px;border-radius:4px;font-size:0.7rem;font-weight:600;animation:pulse 1s infinite;display:none;}
.recording .recording-indicator{display:block;}
</style>
</head>
<body>

<div class="header">
  <div><h1>📹 Video Call — KlawAqua Nexus v8</h1></div>
  <div class="status"><span class="dot"></span><span id="conn-status">Conectado</span></div>
</div>

<div class="main">
  <div class="video-grid">
    <!-- TU WEBCAM -->
    <div class="panel" id="user-panel">
      <div class="panel-label">👤 Tú</div>
      <div class="recording-indicator">🔴 Grabando...</div>
      <video id="user-video" autoplay playsinline muted></video>
    </div>

    <!-- AVATAR KAIYA -->
    <div class="panel">
      <div class="panel-label">💙 KAIYA</div>
      <video id="kaiya-video" autoplay loop muted playsinline>
        <source src="http://localhost:8600/avatar/latest" type="video/mp4">
      </video>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <button class="btn btn-primary" id="btn-speak" onclick="toggleSpeak()">🎤 Hablar</button>
    <button class="btn btn-primary hidden" id="btn-stop" onclick="stopSpeak()">🛑 Detener</button>
    <button class="btn btn-danger" onclick="endCall()">📞 Colgar</button>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat-log">
    <div class="chat-msg"><span class="name">Sistema</span>: Video Call iniciado. Pulsa 🎤 Hablar para hablar con KAIYA.</div>
  </div>
</div>

<script>
let mediaRecorder=null, audioChunks=[], stream=null, isRecording=false;
const API='http://localhost:8600';

// Iniciar webcam
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{
  stream=s;document.getElementById('user-video').srcObject=s;
}).catch(e=>{
  console.log('Webcam no disponible:',e);
  document.getElementById('user-video').style.display='none';
});

function log(msg,who='system'){
  const d=document.createElement('div');d.className='chat-msg '+who;
  d.innerHTML='<span class="name">'+(who==='user'?'Tú':who==='kaiya'?'KAIYA':'Sistema')+'</span>: '+msg;
  document.getElementById('chat-log').appendChild(d);
  document.getElementById('chat-log').scrollTop=99999;
}

async function toggleSpeak(){
  if(!stream){log('Error: micrófono no disponible');return;}
  if(isRecording)return;
  isRecording=true;
  document.getElementById('btn-speak').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('user-panel').classList.add('recording');
  
  const audioStream=new MediaStream(stream.getAudioTracks());
  mediaRecorder=new MediaRecorder(audioStream,{mimeType:'audio/webm'});
  audioChunks=[];
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
  mediaRecorder.start(100);
  log('Escuchando... habla ahora','system');
}

async function stopSpeak(){
  if(!isRecording)return;
  isRecording=false;
  document.getElementById('btn-speak').classList.remove('hidden');
  document.getElementById('btn-stop').classList.add('hidden');
  document.getElementById('user-panel').classList.remove('recording');
  
  if(!mediaRecorder)return;
  mediaRecorder.stop();
  
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:'audio/webm'});
    audioChunks=[];
    if(blob.size<1000){log('Mensaje vacío','system');return;}
    
    log('Transcribiendo con Whisper...','system');
    
    // Enviar audio al endpoint de voz
    const reader=new FileReader();
    reader.onloadend=async()=>{
      const base64=reader.result.split(',')[1];
      try{
        const resp=await fetch(API+'/voice/chat',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({audio:base64,format:'webm'})
        });
        const data=await resp.json();
        
        if(data.transcription){
          log(data.transcription,'user');
        }
        if(data.reply){
          log(data.reply,'kaiya');
        }
        if(data.audio){
          // Reproducir audio de KAIYA
          const audioBlob=await (await fetch('data:audio/mp3;base64,'+data.audio)).blob();
          const audioUrl=URL.createObjectURL(audioBlob);
          const audio=new Audio(audioUrl);
          audio.play();
          
          // Refrescar avatar
          const kv=document.getElementById('kaiya-video');
          kv.src='http://localhost:8600/avatar/latest?t='+Date.now();
          kv.load();kv.play();
        }
      }catch(e){
        log('Error: '+e.message,'system');
      }
    };
    reader.readAsDataURL(blob);
  };
}

function endCall(){window.close();}
</script>

</body>
</html>
